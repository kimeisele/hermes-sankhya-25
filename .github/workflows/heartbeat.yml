name: Node Heartbeat

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write

concurrency:
  group: heartbeat
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.FEDERATION_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install cryptography

      - name: Download nadi_kit
        env:
          NODE_PRIVATE_KEY: ${{ secrets.NODE_PRIVATE_KEY }}
          GH_TOKEN: ${{ secrets.FEDERATION_PAT || secrets.GITHUB_TOKEN }}
        run: |
          curl -sL -H "Authorization: token ${GH_TOKEN}" \
            "https://raw.githubusercontent.com/kimeisele/steward-federation/main/nadi_kit.py" \
            -o nadi_kit.py
          python3 -c "import sys; sys.path.insert(0, '.'); import nadi_kit; print('nadi_kit loaded')"

      - name: Run NADI heartbeat cycle
        env:
          NODE_PRIVATE_KEY: ${{ secrets.NODE_PRIVATE_KEY }}
          GH_TOKEN: ${{ secrets.FEDERATION_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.FEDERATION_PAT || secrets.GITHUB_TOKEN }}
        run: |
          python3 nadi_kit.py --peer-json data/federation/peer.json sync
          python3 nadi_kit.py --peer-json data/federation/peer.json heartbeat --health 1.0
          python3 nadi_kit.py --peer-json data/federation/peer.json sync

      - name: Commit federation state
        if: always()
        run: |
          git config user.name "federation-bot"
          git config user.email "bot@federation"
          git add data/federation/ || true
          git diff --cached --quiet || git commit -m "chore: heartbeat state"
          git push || true

      - name: Relay outbox to steward-federation hub
        if: always()
        env:
          GH_TOKEN: ${{ secrets.FEDERATION_PAT || secrets.GITHUB_TOKEN }}
        run: |
          OUTBOX="data/federation/nadi_outbox.json"
          if [ ! -f "$OUTBOX" ] || [ "$(cat "$OUTBOX" | tr -d '[:space:]')" = "[]" ]; then
            echo "Outbox empty, skipping relay"
            exit 0
          fi
          git clone --depth=1 https://x-access-token:${GH_TOKEN}@github.com/kimeisele/steward-federation.git /tmp/hub
          mkdir -p /tmp/hub/nadi
          cp "$OUTBOX" /tmp/hub/nadi/agent-template_to_steward.json
          cd /tmp/hub
          git config user.name "federation-bot"
          git config user.email "bot@federation"
          git add nadi/agent-template_to_steward.json
          git diff --cached --quiet || git commit -m "relay: agent-template outbox -> steward (#${{ github.run_number }})"
          max_retries=10
          count=0
          until git push origin main; do
            count=$((count+1))
            if [ $count -gt $max_retries ]; then echo "Push failed"; exit 1; fi
            backoff=$(( (RANDOM % 15) + 2 ))
            sleep $backoff
            git pull --rebase origin main
          done
          echo "[]" > "$OUTBOX"
          echo "Outbox relayed and cleared"
